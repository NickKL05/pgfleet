services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pgfleet
      POSTGRES_PASSWORD: pgfleet
      POSTGRES_DB: fleet
    # Bound to loopback: the CLI and demo scripts reach Postgres on
    # localhost:5432 as before, but on a public host (the EC2 demo) the port is
    # never exposed to the internet even if a security group is misconfigured.
    # The dashboard container talks to it over the compose network, not this.
    ports:
      - "127.0.0.1:5432:5432"
    # The demo seed runs once on first initialization, creating the control
    # table, 250 tenant schemas, and the canonical tenant_template.
    volumes:
      - ./demo/seed.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgfleet -d fleet"]
      interval: 2s
      timeout: 3s
      retries: 15

  # The dashboard is gated behind the "dashboard" profile so the demo flow
  # (`docker compose up -d`) keeps starting only Postgres. Bring the UI up with:
  #   docker compose --profile dashboard up -d --build
  # then open http://localhost:8080. The DSN points at the postgres service on
  # the compose network; migrate the fleet first (see README) for a populated UI.
  dashboard:
    profiles: ["dashboard"]
    build:
      context: .
    environment:
      PGFLEET_DSN: postgres://pgfleet:pgfleet@postgres:5432/fleet
    # Bound to loopback. In front of the internet the caddy service below is the
    # only entry point; this publish exists so the host can curl the app
    # directly when debugging.
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # TLS termination. Kept in its own profile so the plain `dashboard` profile
  # still works locally, where there is no public hostname to certify:
  #   docker compose --profile dashboard --profile tls up -d
  # Requires PGFLEET_HOST (and optionally TLS_EMAIL) in a .env file beside this
  # one, plus ports 80 and 443 reachable for the ACME challenge.
  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      PGFLEET_HOST: ${PGFLEET_HOST:?set PGFLEET_HOST in .env}
      TLS_EMAIL: ${TLS_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Issued certificates live here. Without a persistent volume every
      # restart re-requests them and walks into Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
