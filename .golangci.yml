version: "2"

run:
  # Lint the integration-tagged files too, so the testcontainers suite is held
  # to the same standard as the rest of the tree.
  build-tags:
    - integration

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    errcheck:
      # Formatted writes to an io.Writer (rendered output) return errors that
      # are not actionable for stdout; excluding them keeps the render code
      # readable without scattering blank assignments.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
