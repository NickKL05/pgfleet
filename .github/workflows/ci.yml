name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: unit tests (race)
        run: go test -race ./...

  # Build the Vue dashboard so a frontend break is caught in CI. The Go build
  # embeds the committed internal/web/dist, so this job does not gate go build;
  # it verifies the source that regenerates that bundle still compiles.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: build
        working-directory: web
        run: npm run build

  # Integration tests run the real catalog, migration, and repair paths against a
  # live PostgreSQL started via testcontainers, across the 15/16/17 matrix, and
  # enforce the 75% coverage gate on internal/ (the DB-facing code is only
  # exercised here). Docker is available on the ubuntu runners.
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ["15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: integration tests + coverage
        env:
          PGFLEET_PG_IMAGE: postgres:${{ matrix.pg }}
        run: go test -tags integration -coverpkg=./internal/... -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage gate (internal/ >= 75%)
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}' | tr -d '%')
          echo "internal/ coverage on postgres:${{ matrix.pg }} = $total%"
          awk "BEGIN{ exit !($total+0 >= 75) }" || { echo "coverage $total% is below the 75% gate"; exit 1; }
      - if: matrix.pg == '17'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # Validate the goreleaser config and cross-compile every release target on
  # each push, so tagging a release cannot surface a build problem for the
  # first time. This does not publish anything.
  release-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true
      - run: goreleaser check
      - run: goreleaser build --snapshot --clean
