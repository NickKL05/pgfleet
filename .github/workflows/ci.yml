name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: unit tests (race)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage report
        run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # Still deferred: the integration matrix across Postgres 15/16/17 and the 75%
  # coverage gate on internal/. Integration tests exist behind the `integration`
  # build tag (they need a live database) and are kept out of the unit job so it
  # stays fast and offline.
